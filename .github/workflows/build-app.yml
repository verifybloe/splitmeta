name: Build SplitMeta Windows App

on:
  push:
    branches: [master]
    paths:
      - "companion/**"
      - ".github/workflows/build-app.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: companion/package-lock.json

      - name: Install and build
        working-directory: companion
        run: |
          npm ci
          npm run build:app

      - name: Read app version
        id: version
        working-directory: companion
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish installer + updater files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SplitMeta v${{ steps.version.outputs.version }}
          body: |
            SplitMeta Windows installer with auto-updater support.

            Download **SplitMeta-Setup.exe**, run it once, then open SplitMeta from Desktop.
          files: |
            companion/dist/SplitMeta-Setup.exe
            companion/dist/SplitMeta-Setup.exe.blockmap
            companion/dist/latest.yml
          make_latest: true
          fail_on_unmatched_files: true
